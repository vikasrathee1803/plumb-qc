# Ruleset for the live V_CUSTOMER_LTV check (native connector demo).
version: "2026.06.0"
defaults:
  fail_on: "REVIEW"
  max_result_rows: 100000
  statement_timeout_s: 120
  evidence_sample_rows: 20
  redact_pii: true
certified_sources:
  - "PORTFOLIO_DEMO_DB.ANALYTICS.V_CUSTOMER_LTV"
checks:
  - id: S-STAT-001
    enabled: true
  - id: S-STAT-002
    enabled: true
  - id: S-META-001
    enabled: true
  - id: S-META-004
    enabled: true
  - id: D-GRAIN-001
    enabled: true
    params: { key: ["customer_id"] }
  - id: D-NULL-001
    enabled: true
    params: { key: ["customer_id"] }
  - id: D-DUP-001
    enabled: true
  - id: D-FRESH-001
    enabled: true
    params: { event_ts_col: "last_order_date", sla_hours: 24 }
  - id: D-RECON-001
    enabled: true
    params:
      metric_sql: "SELECT SUM(lifetime_revenue) AS m FROM {{ target }}"
      source_of_truth_sql: "SELECT SUM(total_revenue) AS m FROM PORTFOLIO_DEMO_DB.ANALYTICS.V_ORDER_ANALYTICS"
      tolerance_abs: 0
      tolerance_pct: 0.01
  - id: P-PROF-001
    enabled: true
  - id: P-CARD-001
    enabled: true
